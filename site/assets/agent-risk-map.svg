  <text x="780" y="660" font-family="Inter, Arial, sans-serif" font-size="14" fill="#455a55">2. Add approval gate before write actions</text>
  <text x="780" y="692" font-family="Inter, Arial, sans-serif" font-size="14" fill="#455a55">3. Turn on request and token audit logging</text>
